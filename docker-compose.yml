services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: checksalary-db
    environment:
      POSTGRES_DB: checksalary
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: checksalary-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: checksalary-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: checksalary-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"

volumes:
  pgdata: